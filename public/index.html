<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>blastgrid</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div id="app">
      <header><h1>blast<span>grid</span></h1></header>

      <section id="enter">
        <div class="panel">
          <p class="lead">One shared world that grows as more players join. Roam, blow up
            crates, grab powerups, and blast the other blobs.</p>
          <label>Your name
            <input id="name" maxlength="16" autocomplete="off" placeholder="player" />
          </label>
          <button id="joinBtn">Join the world</button>
          <p id="enterError" class="error"></p>
          <p class="hint">WASD / arrows to move · Space to drop bombs</p>
        </div>
      </section>

      <section id="game" hidden>
        <div id="hudbar">
          <div id="hud"></div>
          <span class="hint">WASD / arrows · Space to bomb</span>
        </div>
        <div id="playarea">
          <aside id="scoreLeft" class="scoreboard"></aside>
          <div id="stage">
            <canvas id="canvas" width="760" height="600"></canvas>
            <div id="status" hidden></div>
          </div>
          <aside id="scoreRight" class="scoreboard"></aside>
        </div>
      </section>
    </div>

    <script type="module" src="/bundle.js"></script>
  </body>
</html>
